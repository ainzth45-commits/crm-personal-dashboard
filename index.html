<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Dashboard · Realtime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
<style>
:root{
  --bg:#080b16;--panel:#121829;--panel2:#0f1422;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.05);
  --ink:#eef2fb;--ink2:#aab4cd;--muted:#69748f;
  --green:#34d399;--teal:#2dd4bf;--blue:#60a5fa;--violet:#a78bfa;--amber:#fbbf24;--gold:#fcd34d;--rose:#fb7185;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kanit',sans-serif;color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1100px 600px at 88% -10%, rgba(124,92,255,.16), transparent 60%),
    radial-gradient(900px 500px at -8% 4%, rgba(45,212,191,.12), transparent 55%),
    var(--bg);
  background-attachment:fixed}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px}
.mono{font-family:var(--mono)}

/* TOPBAR */
.topbar{padding:24px 22px 6px}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand .logo{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#6d5cf0,#34d399);display:grid;place-items:center;color:#fff;font-size:22px;box-shadow:0 10px 30px rgba(109,92,240,.45)}
.brand h1{font-size:1.5rem;font-weight:800;letter-spacing:-.5px}
.brand p{font-size:.86rem;color:var(--ink2);font-weight:300;margin-top:-3px}
.live{display:inline-flex;align-items:center;gap:9px;font-size:.86rem;font-weight:600;background:rgba(255,255,255,.05);border:1px solid var(--line);padding:9px 16px;border-radius:999px;color:var(--ink2)}
.live .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
.live.on{color:#46e3a3;border-color:rgba(52,211,153,.3)}
.live.on .dot{background:var(--green);box-shadow:0 0 0 0 rgba(52,211,153,.7);animation:pulse 1.6s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 9px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

/* PERIOD BAR (sticky / ตึงไว้) */
.period{position:sticky;top:0;z-index:50;padding:12px 22px;margin-top:12px;
  background:rgba(8,11,22,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.period .wrap{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg button,.pick-btn{font-family:inherit;font-size:.9rem;font-weight:600;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink2);padding:9px 16px;border-radius:12px;cursor:pointer;transition:.16s;white-space:nowrap}
.seg button:hover,.pick-btn:hover{background:rgba(255,255,255,.08);color:var(--ink);border-color:rgba(255,255,255,.18)}
.seg button.active{background:linear-gradient(135deg,#6d5cf0,#8b5cf6);color:#fff;border-color:transparent;box-shadow:0 8px 22px rgba(109,92,240,.4)}
.pick-btn{border-style:dashed}
.pick-btn.active{background:linear-gradient(135deg,#6d5cf0,#8b5cf6);color:#fff;border-style:solid;border-color:transparent;box-shadow:0 8px 22px rgba(109,92,240,.4)}
.pick-btn i{margin-right:7px}
/* ปุ่มยุบช่วงเวลา (เฉพาะมือถือ) — เดสก์ท็อปซ่อน, เมนูแสดงผลปกติ */
#periodTrigger{display:none}
#periodMenu{display:contents}
.period-trigger{font-family:inherit;font-size:.92rem;font-weight:600;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);padding:10px 14px;border-radius:12px;cursor:pointer;align-items:center;gap:10px}
.period-trigger>i:first-child{color:var(--violet)}
.period-trigger .caret{margin-left:auto;font-size:.72rem;color:var(--ink2);transition:transform .22s}
.period.open .period-trigger .caret{transform:rotate(180deg)}
.spacer{flex:1}
.upd{font-size:.78rem;color:var(--muted);white-space:nowrap}
.iconbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink2);cursor:pointer;transition:.16s}
.iconbtn:hover{background:rgba(255,255,255,.08);color:var(--ink);transform:rotate(40deg)}

main{padding:20px 0 40px}
.err{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.35);color:#fda4af;border-radius:14px;padding:13px 17px;margin-bottom:16px;font-size:.9rem;display:none}

/* KPI — 2 ใบใหญ่ */
.kpis{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:18px}
.kpi{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:22px;padding:24px 26px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:var(--c);opacity:.14;filter:blur(6px)}
.kpi .top{display:flex;align-items:center;gap:11px;margin-bottom:14px;position:relative}
.kpi .ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;color:#06121a;font-size:18px;background:var(--c);box-shadow:0 8px 22px -4px var(--c)}
.kpi .lbl{font-size:.95rem;color:var(--ink2);font-weight:500}
.kpi .v{font-family:var(--mono);font-size:2.7rem;font-weight:700;letter-spacing:.5px;line-height:1;position:relative}
.kpi .v small{font-family:'Kanit',sans-serif;font-size:1.2rem;color:var(--muted);font-weight:600;letter-spacing:0}
.kpi .sub{font-size:.86rem;color:var(--muted);margin-top:8px;position:relative}

/* TEAM SELECTOR */
.teambar{padding:14px 22px 0}
.teambar .wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.teambar .tlabel{font-size:.82rem;color:var(--muted);font-weight:600;margin-right:4px}
.team-pill{font-family:inherit;font-size:.9rem;font-weight:600;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink2);padding:8px 16px;border-radius:999px;cursor:pointer;transition:.16s;white-space:nowrap}
.team-pill:hover{background:rgba(255,255,255,.08);color:var(--ink)}
.team-pill.active{color:#fff;border-color:transparent;background:var(--tc,#6d5cf0);box-shadow:0 6px 18px -4px var(--tc)}
/* ปุ่มสลับรูปแบบเวลา (m:ss / h:mm:ss) — ชิดขวาในแถวเดียวกับทีม */
.fmt-group{margin-left:auto;display:inline-flex;align-items:center;gap:6px}
.fmt-pill{font-family:var(--mono);font-size:.82rem;font-weight:700;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink2);padding:7px 12px;border-radius:999px;cursor:pointer;transition:.16s;white-space:nowrap}
.fmt-pill:hover{background:rgba(255,255,255,.08);color:var(--ink)}
.fmt-pill.active{color:#fff;border-color:transparent;background:#6d5cf0;box-shadow:0 6px 18px -4px rgba(109,92,240,.5)}

/* CYCLE PICKER (รอบบิล 26-25: เลือกปี+เดือน) */
.cyclepick{display:none;align-items:center;gap:6px;margin-left:2px}
.cyclepick.active{display:inline-flex}   /* โชว์เฉพาะตอนอยู่โหมดรอบบิล */
.cyclepick select{font-family:inherit;font-size:.9rem;font-weight:600;color:var(--ink);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer}
.cyclepick select:focus{outline:none;border-color:var(--violet)}

/* LOADING SPINNER (overlay บนกระดานอันดับ) */
#boardLoad{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(8,11,22,.5);backdrop-filter:blur(2px);z-index:20;border-radius:20px}
#boardLoad.on{display:flex}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.14);border-top-color:var(--violet);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── INCENTIVE: ปุ่ม + popup (เฉพาะโหมดรอบเดือน) ── */
#incentiveBtn{display:none;font-family:inherit;font-size:.9rem;font-weight:700;border:1px solid rgba(252,211,77,.45);background:rgba(252,211,77,.12);color:var(--gold);padding:9px 15px;border-radius:12px;cursor:pointer;transition:.16s;white-space:nowrap;align-items:center;gap:7px}
#incentiveBtn:hover{background:rgba(252,211,77,.22)}
.inc-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(4,6,12,.72);backdrop-filter:blur(4px);padding:18px}
.inc-modal.on{display:flex}
.inc-card{width:min(96vw,840px);max-height:90vh;display:flex;flex-direction:column;background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden}
.inc-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.inc-head h3{font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.inc-head h3 span{font-size:.82rem;color:var(--muted);font-weight:500}
.inc-head button{background:none;border:none;color:var(--ink2);font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px}
.inc-cond{display:flex;flex-wrap:wrap;gap:10px 18px;padding:15px 22px;border-bottom:1px solid var(--line)}
.inc-cond label{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--ink2);font-weight:500}
.inc-cond input{width:72px;font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--ink);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:9px;padding:7px 9px;text-align:center}
.inc-cond input:focus{outline:none;border-color:var(--violet)}
.inc-summary{padding:12px 22px;font-size:.9rem;color:var(--ink2);border-bottom:1px solid var(--line)}
.inc-summary b{color:var(--gold);font-family:var(--mono)}
.inc-results{overflow-y:auto;padding:14px}
.inc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.inc-emp{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px}
.inc-emp.full{border-color:rgba(252,211,77,.55);background:rgba(252,211,77,.08);box-shadow:0 8px 24px -8px rgba(252,211,77,.45)}
.inc-emp .avawrap{position:relative;width:88px;height:88px;margin-bottom:2px}
.inc-emp .ava{width:88px;height:88px;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.06);color:var(--ink2);font-weight:700;font-size:2rem;border:2.5px solid var(--line)}
.inc-emp.full .ava{border-color:var(--gold)}
.inc-emp .ava img{width:100%;height:100%;object-fit:cover}
.inc-emp .cnt{position:absolute;bottom:-3px;right:-3px;min-width:30px;height:30px;padding:0 6px;border-radius:999px;background:var(--gold);color:#1a1400;font-family:var(--mono);font-weight:800;font-size:.9rem;display:grid;place-items:center;border:3px solid var(--panel)}
.inc-emp .nm{font-weight:700;font-size:1.05rem;line-height:1.2}
.inc-emp .cd{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:-3px}
.inc-emp .awards{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:3px}
.inc-aw{font-size:.72rem;font-weight:700;padding:5px 9px;border-radius:9px;white-space:nowrap}
.inc-aw.on{background:rgba(52,211,153,.18);color:#46e3a3;border:1px solid rgba(52,211,153,.4)}
.inc-aw.off{background:rgba(255,255,255,.03);color:var(--muted);border:1px solid var(--line);opacity:.55}
.inc-emp .met{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
.inc-empty{text-align:center;color:var(--muted);padding:30px}

/* TABS */
.tabs{display:flex;gap:9px;margin-bottom:18px;flex-wrap:wrap}
.tabs button{font-family:inherit;font-size:.96rem;font-weight:600;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--ink2);padding:11px 20px;border-radius:13px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:9px}
.tabs button:hover{transform:translateY(-2px);color:var(--ink)}
.tabs button .d{width:10px;height:10px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
.tabs button.active{color:#fff;border-color:transparent;background:rgba(255,255,255,.06);box-shadow:inset 0 0 0 1.5px var(--ac),0 8px 20px -6px var(--ac)}
.tabs .cycle-only{display:none}
.tabs.cycle .cycle-only{display:flex}

/* BOARD: ซ้าย featured | ขวา list */
.board{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;align-items:stretch;position:relative}
.feat{display:flex;flex-direction:column;gap:14px}
.pod-pair{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pod{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;position:relative;overflow:hidden;animation:rise .4s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}}
.pod .glow{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% -10%,var(--ac),transparent 60%);opacity:.16;pointer-events:none}
.pod .medal{position:absolute;top:13px;left:15px;font-size:1.5rem;z-index:2}
.pod.swap .ava,.pod.swap .nm{animation:swapfade .45s ease}
@keyframes swapfade{from{opacity:0;transform:scale(.92)}}
/* #1 ใหญ่ */
.pod-1{padding:28px 30px;display:flex;flex-direction:column}
.pod-1 .pod-top{display:flex;align-items:center;gap:28px}
.pod-1 .ava{width:128px;height:128px;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.06);color:var(--ink2);font-weight:700;font-size:3.2rem;flex:0 0 auto;border:3px solid var(--ac);box-shadow:0 14px 38px -6px var(--ac)}
.pod-1 .ava img{width:100%;height:100%;object-fit:cover}
.pod-1 .info{flex:1;min-width:0;position:relative}
.pod-1 .nm{font-weight:800;font-size:1.9rem;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod-1 .cd{font-family:var(--mono);font-size:.84rem;color:var(--muted);display:inline-block;margin-bottom:4px}
.pod-1 .num{font-family:var(--mono);font-weight:700;font-size:3.9rem;letter-spacing:1px;line-height:1.05;color:var(--ac);margin:12px 0 7px}
.pod-1 .pu{font-family:'Kanit',sans-serif;font-size:1.25rem;color:var(--muted);font-weight:600;letter-spacing:0}
.pod-1 .sub{font-size:.88rem;color:var(--muted);margin-top:2px}
.pod-1 .stat-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
.pod-1 .st{display:flex;flex-direction:column;gap:3px;min-width:0}
.pod-1 .st .sl{font-size:.66rem;color:var(--muted);font-weight:500;letter-spacing:.2px}
.pod-1 .st .sv{font-size:1.02rem;font-weight:700;font-family:var(--mono);color:var(--ink);white-space:nowrap}
/* #2 #3 */
.pod-sm{padding:18px 16px 16px;text-align:center}
.pod-sm .ava{width:70px;height:70px;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.06);color:var(--ink2);font-weight:700;font-size:1.6rem;margin:8px auto 10px;border:2.5px solid var(--ac);box-shadow:0 8px 20px -8px var(--ac)}
.pod-sm .ava img{width:100%;height:100%;object-fit:cover}
.pod-sm .nm{font-weight:600;font-size:.96rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod-sm .cd{font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.pod-sm .num{font-family:var(--mono);font-weight:700;font-size:1.55rem;letter-spacing:0;margin-top:9px;color:var(--ac)}
.pod-sm .pu{font-size:.7rem;color:var(--muted);font-weight:600}
.pod-sm .sub{font-size:.7rem;color:var(--muted);margin-top:2px}

/* RIGHT LIST #4+ */
.rest{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;position:relative;overflow:hidden;min-height:340px}
.rest-inner{position:absolute;inset:0;overflow-y:auto;padding:8px}
.rest-inner::-webkit-scrollbar{width:9px}
.rest-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
.rest-inner::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.24);background-clip:padding-box}
.rest-inner::-webkit-scrollbar-track{background:transparent}
.rest .rhead{position:sticky;top:0;z-index:3;background:var(--panel);padding:12px 16px 9px;font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.row{display:flex;align-items:center;gap:12px;padding:8px 14px;border-radius:13px;transition:background .14s;animation:fade .3s ease both}
@keyframes fade{from{opacity:0}}
.row:hover{background:rgba(255,255,255,.04)}
.row+.row{border-top:1px solid var(--line2)}
.row .pos{width:26px;text-align:center;font-weight:700;color:var(--muted);font-size:1rem;flex:0 0 auto}
.ava-s{width:40px;height:40px;border-radius:50%;overflow:hidden;flex:0 0 auto;display:grid;place-items:center;background:rgba(255,255,255,.06);color:var(--ink2);font-weight:700;border:1.5px solid var(--line)}
.ava-s img{width:100%;height:100%;object-fit:cover}
.info-r{flex:1;min-width:0}
.info-r .nm{font-weight:600;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-r .nm .cd{font-family:var(--mono);font-size:.7rem;color:var(--muted);font-weight:600;margin-left:8px}
.info-r .bar{height:6px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;margin-top:5px}
.info-r .bar i{display:block;height:100%;border-radius:5px;transition:width .55s cubic-bezier(.4,0,.2,1)}
.info-r .sub{font-size:.74rem;color:var(--muted);margin-top:2px}
.val{text-align:right;flex:0 0 auto;min-width:96px}
.val .n{font-weight:800;font-size:1.18rem;font-family:var(--mono);letter-spacing:-.5px}
.val .u{font-size:.68rem;color:var(--muted)}

.msg{text-align:center;padding:50px 20px;color:var(--muted)}
.msg i{font-size:1.8rem;display:block;margin-bottom:12px;opacity:.4}
footer{text-align:center;color:var(--muted);font-size:.78rem;padding:24px 16px;font-weight:300}

.flatpickr-calendar{font-family:'Kanit'}
@media(max-width:880px){.kpis{grid-template-columns:1fr}.board{grid-template-columns:1fr}.brand h1{font-size:1.25rem}.kpi .v{font-size:2.5rem}.rest{overflow:visible;min-height:0}.rest-inner{position:static;max-height:65vh}}
@media(max-width:560px){.pod-1{flex-direction:column;text-align:center}.pod-1 .num{font-size:2rem}}
/* มือถือ: Hero #1 + ลิสต์ยาว (ซ่อนการ์ดคู่ #2/#3 → ย้ายเข้าลิสต์แทน ผ่าน podCount ใน JS) */
@media(max-width:700px){
  .wrap{padding:0 14px}
  .pod-pair{display:none}
  .pod-1{padding:20px 18px}
  .pod-1 .pod-top{gap:16px}
  .pod-1 .ava{width:88px;height:88px;font-size:2.1rem;border-width:2.5px}
  .pod-1 .nm{font-size:1.4rem}
  .pod-1 .num{font-size:2.5rem;margin:8px 0 5px}
  .pod-1 .pu{font-size:1rem}
  .pod-1 .stat-strip{grid-template-columns:repeat(3,1fr);gap:11px 10px;margin-top:14px;padding-top:14px}
  .pod-1 .st .sl{font-size:.64rem}
  .pod-1 .st .sv{font-size:.95rem}
  .tabs{gap:7px}.tabs button{padding:9px 14px;font-size:.9rem}
  .kpi .v{font-size:2.1rem}
  .row{gap:10px;padding:9px 10px}
  .val{min-width:84px}.val .n{font-size:1.05rem}
  /* ช่วงเวลา: โชว์ปุ่มเดียว (ค่าที่เลือก) + ที่เหลืออยู่ในเมนู dropdown */

}

// ── วันหยุด: อาทิตย์ตัดอัตโนมัติ + วันหยุดประจำปีจากตาราง holidays · ใช้คิด "วันทำงาน" ───
let HOLIDAYS=new Set(), EXPECT_WD=0;
async function loadHolidays(){ const{data,error}=await sb.from('holidays').select('d'); if(!error&&data) HOLIDAYS=new Set(data.map(x=>x.d)); }
const ymdOf=iso=>new Date(iso).toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
// จำนวนวันทำงานในช่วง (ไม่ใช่อาทิตย์ + ไม่ใช่วันหยุด) · ไม่นับอนาคต (cap ที่วันนี้)
function expectedWorkDays(r){
  let cur=ymdOf(r.start), endY=ymdOf(r.end);
  const cap=addYMD(todayYMD(),1); if(endY>cap) endY=cap;
  let n=0;
  while(cur<endY){
    const dow=new Date(cur+'T12:00:00+07:00').toLocaleDateString('en-US',{timeZone:'Asia/Bangkok',weekday:'short'});
    if(dow!=='Sun' && !HOLIDAYS.has(cur)) n++;
    cur=addYMD(cur,1);
  }
  return n;
}

function perfect(a){ return curRange==='cycle' && EXPECT_WD>0 && a.workDays>=EXPECT_WD; }

const baht=n=>Math.round(n).toLocaleString('en-US');
const hms=s=>{s=Math.round(s||0);const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;return h?`${h}:${pad(m)}:${pad(x)}`:`${m}:${pad(x)}`;};
const msmm=s=>{s=Math.round(s||0);return Math.floor(s/60)+':'+pad(s%60);}; // นาที:วิ
let timeFmt='mss';                                    // 'mss'=m:ss (default) | 'hms'=h:mm:ss
const fmtTime=s=>timeFmt==='hms'?hms(s):msmm(s);      // ฟอร์แมตเวลาตามที่เลือก

let curRange='today',curMetric='sales',AGG=[],pollTimer=null,rtTimer=null,channel=null;
const METRICS={
  sales:{unit:'฿',color:'var(--green)',val:a=>a.sales,fmt:v=>baht(v),sub:a=>`${a.bills} บิล · AOV ${a.paidBills?baht(a.sales/a.paidBills):'-'}`,keep:a=>a.calls>0||a.bills>0},

  talkday:{unit:'/วัน',color:'var(--teal)',val:a=>a.workTalk/(a.workDays||1),fmt:v=>fmtTime(v),sub:a=>`${a.workDays} วันทำงาน · รวม ${fmtTime(a.workTalk)}`,keep:a=>a.workCalls>0},

};

let _loadSeq=0;

// รวมยอดฝั่ง server (RPC dashboard_agg) → ดึง ~25 แถวแทนแถวดิบหลักหมื่น = เร็ว
// silent=true → ไม่โชว์ spinner (ใช้ตอน realtime/poll auto-refresh กันกระพริบ)
async function load(silent){
  const r=getRange(); if(!r)return;
  setErr(''); document.getElementById('rangeLabel').textContent=r.label;
  const seq=++_loadSeq;                 // กันผลลัพธ์ช่วงเก่ามาทับตอนสลับเร็วๆ
  if(!silent) showLoading(true);

    if(!Object.keys(EMP).length)await loadEmployees();

    if(error)throw error;
    if(seq!==_loadSeq)return;            // มี load ใหม่กว่าแล้ว → ทิ้งผลเก่า
    AGG=(data||[]).map(a=>({id:a.employee_id,calls:a.calls,answered:a.answered,talk:Number(a.talk)||0,qual:a.qual,
      bills:a.bills,paidBills:a.paid_bills,sales:Number(a.sales)||0,upcnt:a.upcnt,upsum:Number(a.upsum)||0,days:a.active_days||1,
      workTalk:Number(a.work_talk)||0,workCalls:a.work_calls||0,workDays:a.work_days||0}));
    EXPECT_WD=expectedWorkDays(r);
    if(curRange==='cycle') document.getElementById('rangeLabel').textContent=r.label+' · '+EXPECT_WD+' วันทำงาน';
    renderKpis(); renderRank();
    document.getElementById('upd').textContent='อัปเดต '+new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok',hour:'2-digit',minute:'2-digit',second:'2-digit'});

}

function setNum(el,to,fmt,instant){if(!el)return;const from=instant?to:(el._c==null?to:el._c);el._c=to;animateVal(from,to,instant?0:650,v=>el.textContent=fmt(v));}

  const A=AGG.filter(teamMatch);
  const T=A.reduce((o,a)=>({bills:o.bills+a.bills,paid:o.paid+a.paidBills,sales:o.sales+a.sales,closers:o.closers}),{bills:0,paid:0,sales:0,closers:0});
  const closers=A.filter(a=>a.paidBills>0).length;
  const aov=T.paid?T.sales/T.paid:0;
  if(!_kpiInit){
    document.getElementById('kpis').innerHTML=`
      <div class="kpi" style="--c:var(--green)"><div class="top"><div class="ic"><i class="fa-solid fa-sack-dollar"></i></div><div class="lbl">ยอดขายรวม</div></div><div class="v"><span id="kSales">0</span> <small>฿</small></div><div class="sub"><span id="kBills">0</span> บิล · ปิดได้ <span id="kClose">0</span> คน</div></div>
      <div class="kpi" style="--c:var(--violet)"><div class="top"><div class="ic"><i class="fa-solid fa-receipt"></i></div><div class="lbl">AOV เฉลี่ยทั้งทีม</div></div><div class="v"><span id="kAov">0</span> <small>฿/บิล</small></div><div class="sub">ยอดขาย ÷ บิลที่มียอด (ไม่นับบิล 0)</div></div>`;
    _kpiInit=true;
  }
  const ins=_firstKpi;_firstKpi=false;
  setNum(byId('kSales'),T.sales,baht,ins);
  setNum(byId('kBills'),T.bills,v=>Math.round(v),ins);
  setNum(byId('kClose'),closers,v=>Math.round(v),ins);
  setNum(byId('kAov'),aov,baht,ins);
}

function buildPodium(){
  document.getElementById('feat').innerHTML=`
    <div class="pod pod-1" data-slot="0"><div class="glow"></div><div class="medal">🥇</div>
      <div class="pod-top">
        <div class="ava"></div>
        <div class="info"><div class="nm"></div><div class="cd"></div>
          <div class="num"><span class="nv"></span><span class="pu"></span></div><div class="sub"></div></div>
      </div>
      <div class="stat-strip">
        <div class="st"><span class="sl">ยอดขาย</span><span class="sv s1"></span></div>
        <div class="st"><span class="sl">บิล</span><span class="sv s2"></span></div>
        <div class="st"><span class="sl">AOV</span><span class="sv s3"></span></div>
        <div class="st"><span class="sl">Talktime</span><span class="sv s4"></span></div>
        <div class="st"><span class="sl">รับสาย</span><span class="sv s5"></span></div>
        <div class="st"><span class="sl">อัพเซล</span><span class="sv s6"></span></div>
      </div></div>
    <div class="pod-pair">
      <div class="pod pod-sm" data-slot="1"><div class="glow"></div><div class="medal">🥈</div><div class="ava"></div><div class="nm"></div><div class="cd"></div><div class="num"><span class="nv"></span><span class="pu"></span></div><div class="sub"></div></div>
      <div class="pod pod-sm" data-slot="2"><div class="glow"></div><div class="medal">🥉</div><div class="ava"></div><div class="nm"></div><div class="cd"></div><div class="num"><span class="nv"></span><span class="pu"></span></div><div class="sub"></div></div>
    </div>`;
  _podInit=true;
}
function renderPodium(top,M,instant){
  if(!_podInit)buildPodium();
  document.querySelectorAll('#feat .pod').forEach(slot=>{
    const i=+slot.dataset.slot, o=top[i];
    slot.style.setProperty('--ac',M.color);
    if(!o){slot.style.visibility='hidden';return;}
    slot.style.visibility='';
    const e=EMP[o.a.id]||{name:o.a.id};
    const changed=slot._id!==o.a.id;slot._id=o.a.id;
    if(changed){slot.querySelector('.ava').innerHTML=avaImg(e);slot.querySelector('.cd').textContent=o.a.id;slot.classList.remove('swap');void slot.offsetWidth;slot.classList.add('swap');}
    slot.querySelector('.nm').textContent=(e.name||o.a.id)+(perfect(o.a)?' ⭐':'');   // ดาว=มาครบทุกวันทำงาน
    slot.querySelector('.sub').textContent=M.sub(o.a);
    slot.querySelector('.pu').textContent=' '+M.unit;
    setNum(slot.querySelector('.nv'),o.v,v=>M.fmt(v),instant||changed);
    if(i===0){const a=o.a; // [#1] โปรไฟล์แชมป์ครบทุกมุม
      slot.querySelector('.s1').textContent=baht(a.sales)+'฿';
      slot.querySelector('.s2').textContent=a.bills;
      slot.querySelector('.s3').textContent=a.paidBills?baht(a.sales/a.paidBills):'-';
      slot.querySelector('.s4').textContent=fmtTime(a.talk);
      slot.querySelector('.s5').textContent=a.calls?Math.round(a.answered/a.calls*100)+'%':'-';
      slot.querySelector('.s6').textContent=a.upsum?baht(a.upsum)+'฿':'-';
    }
  });
}
function buildRow(id){
  const e=EMP[id]||{name:id};
  const el=document.createElement('div');el.className='row';el.dataset.id=id;
  el.innerHTML=`<div class="pos"></div><div class="ava-s">${avaImg(e)}</div>
    <div class="info-r"><div class="nm">${e.name||id}<span class="cd">${id}</span><span class="star"></span></div><div class="bar"><i></i></div><div class="sub"></div></div>
    <div class="val"><div class="n"></div><div class="u"></div></div>`;
  return el;
}
function updateRow(el,o,rank,max,M,instant){
  el.querySelector('.pos').textContent=rank;
  const bar=el.querySelector('.bar i');bar.style.width=Math.max(3,o.v/max*100)+'%';bar.style.background=M.color;
  el.querySelector('.star').textContent=perfect(o.a)?' ⭐':'';
  el.querySelector('.sub').textContent=M.sub(o.a);
  const n=el.querySelector('.val .n');n.style.color=M.color;
  el.querySelector('.val .u').textContent=M.unit;
  setNum(n,o.v,v=>M.fmt(v),instant);
}
function renderList(rest,max,M,instant,startRank){
  startRank=startRank||4;   // เดสก์ท็อปเริ่มที่ #4 · มือถือเริ่มที่ #2 (podCount=1)
  const cont=document.getElementById('restScroll');
  const msg=cont.querySelector('.msg');if(msg)msg.remove();
  const order=rest.map(o=>o.a.id),oset=new Set(order);
  Object.keys(rowMap).forEach(id=>{if(!oset.has(id)){rowMap[id].remove();delete rowMap[id];}});
  const fresh=new Set();
  rest.forEach((o,i)=>{let el=rowMap[o.a.id];if(!el){el=buildRow(o.a.id);rowMap[o.a.id]=el;cont.appendChild(el);fresh.add(o.a.id);}updateRow(el,o,i+startRank,max,M,instant);});
  const domOrder=[...cont.querySelectorAll('.row')].map(c=>c.dataset.id);
  const changed=fresh.size>0||domOrder.length!==order.length||domOrder.some((id,i)=>id!==order[i]);
  if(rest.length===0){ if(!cont.querySelector('.msg')){const d=document.createElement('div');d.className='msg';d.style.padding='30px';d.textContent='— ไม่มีอันดับถัดไป —';cont.appendChild(d);} return; }
  if(!changed)return;
  const first={};[...cont.querySelectorAll('.row')].forEach(el=>{if(!fresh.has(el.dataset.id))first[el.dataset.id]=el.getBoundingClientRect().top;});
  order.forEach(id=>cont.appendChild(rowMap[id]));
  order.forEach(id=>{const el=rowMap[id],f=first[id];if(f==null)return;const dy=f-el.getBoundingClientRect().top;if(dy){el.style.transition='none';el.style.transform=`translateY(${dy}px)`;requestAnimationFrame(()=>{el.style.transition='transform .55s cubic-bezier(.4,0,.2,1)';el.style.transform='';});}});
}
function renderRank(){
  const M=METRICS[curMetric];
  const list=AGG.filter(teamMatch).filter(M.keep).map(a=>({a,v:M.val(a)})).filter(o=>curMetric==='answer'?o.a.calls>0:o.v>0).sort((p,q)=>q.v-p.v);
  const max=Math.max(1,...list.map(o=>o.v));
  const instant=lastMetric!==curMetric;lastMetric=curMetric;
  if(!list.length){document.getElementById('feat').innerHTML='';_podInit=false;Object.keys(rowMap).forEach(id=>rowMap[id].remove());rowMap={};document.getElementById('restScroll').innerHTML='<div class="msg"><i class="fa-solid fa-inbox"></i>ยังไม่มีข้อมูลในช่วงนี้</div>';return;}
  // มือถือ (≤700px): โพเดียมเหลือ #1 อย่างเดียว แล้ว #2→ท้าย เป็นลิสต์ยาว · เดสก์ท็อป: โพเดียม #1-3 + ลิสต์ #4+
  const podCount=matchMedia('(max-width:700px)').matches?1:3;
  renderPodium(list.slice(0,podCount),M,instant);
  renderList(list.slice(podCount),max,M,instant,podCount+1);
}

function setupLive(isLive){
  const live=document.getElementById('live'),tx=document.getElementById('liveTx');
  clearInterval(pollTimer);pollTimer=null;
  if(isLive){
    live.classList.add('on');tx.textContent='LIVE · วันนี้';
    if(!channel)channel=sb.channel('rt')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'calls'},onRt)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'sales'},onRt)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'upsells'},onRt).subscribe();
    pollTimer=setInterval(()=>{if(curRange==='today')load(true);},30000);
  }else{live.classList.remove('on');tx.textContent='snapshot';}
}
function onRt(){clearTimeout(rtTimer);rtTimer=setTimeout(()=>{if(curRange==='today')load(true);},1200);}
function setErr(m){const e=document.getElementById('err');e.style.display=m?'block':'none';e.textContent=m;}

// events
document.querySelectorAll('#ranges button[data-r]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#ranges button').forEach(x=>x.classList.remove('active'));

  setPeriodLabel(b.textContent.trim()); closePeriodMenu();   // มือถือ: อัปเดตปุ่มยุบ + ปิดเมนู
  load();
}));
document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('active'));

}));
document.getElementById('refresh').addEventListener('click',()=>load());

// ── Cycle picker (รอบบิล 26-25: เลือกปี + เดือน) ──
const cYear=document.getElementById('cycYear'), cMonth=document.getElementById('cycMonth');
[2025,2026].forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;cYear.appendChild(o);});
THMON.forEach((nm,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=nm;cMonth.appendChild(o);});
(function(){const[ty,tm,td]=todayYMD().split('-').map(Number);let by=ty,bm=tm;if(td>=26){bm=tm+1;if(bm>12){bm=1;by++;}}cYear.value=by;cMonth.value=bm;})();
let lastCycleKey='';
function setCycleTabs(on){
  document.getElementById('tabs').classList.toggle('cycle',on);
  if(!on && (curMetric==='talkday'||curMetric==='callday')){   // ออกโหมด → เด้งกลับ talk
    curMetric='talk';
    document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('active',x.dataset.m==='talk'));
  }
}
function exitCycle(){
  document.getElementById('cyclePick').classList.remove('active');
  document.getElementById('cycleBtn').classList.remove('active');
  document.getElementById('incentiveBtn').style.display='none';
  document.getElementById('incModal').classList.remove('on');
  lastCycleKey=''; setCycleTabs(false);
}
function applyCycle(){
  const y=+cYear.value, m=+cMonth.value, key=y+'-'+m;
  if(curRange==='cycle' && key===lastCycleKey) return;   // เลือกเดิม ไม่ต้องโหลดซ้ำ
  lastCycleKey=key; cycleR=cycleRange(y,m); curRange='cycle';
  document.querySelectorAll('#ranges button').forEach(x=>x.classList.remove('active'));
  document.getElementById('cycleBtn').classList.add('active');
  document.getElementById('pickBtn').classList.remove('active');
  document.getElementById('cyclePick').classList.add('active');
  document.getElementById('incentiveBtn').style.display='inline-flex';
  setCycleTabs(true);
  setPeriodLabel('รอบ '+THMON[m-1]+' '+y); closePeriodMenu();
  load();
}
// ปุ่มรอบบิล → เข้าโหมด + default รอบบิลล่าสุด + โชว์ dropdown
document.getElementById('cycleBtn').addEventListener('click',()=>{
  const[ty,tm,td]=todayYMD().split('-').map(Number);let by=ty,bm=tm;if(td>=26){bm=tm+1;if(bm>12){bm=1;by++;}}
  cYear.value=by; cMonth.value=bm; lastCycleKey=''; applyCycle();
});
cYear.addEventListener('change',applyCycle);
cMonth.addEventListener('change',applyCycle);

// ── Incentive popup: ตรวจคนผ่านเงื่อนไขรับ incentive ประจำรอบเดือน ──
function renderIncentive(){
  const maxLeave=+document.getElementById('incLeave').value||0;
  const minTalk=(+document.getElementById('incTalk').value||0)*60;   // นาที→วินาที
  const minCalls=+document.getElementById('incCalls').value||0;
  const rows=AGG.filter(teamMatch).map(a=>{
    const leave=Math.max(0, EXPECT_WD - a.workDays);
    const tpd=a.workDays?a.workTalk/a.workDays:0, cpd=a.workDays?a.workCalls/a.workDays:0;
    const t1=leave<=maxLeave, t2a=t1&&tpd>=minTalk, t2b=t1&&cpd>=minCalls;
    return {a,leave,tpd,cpd,t1,t2a,t2b,count:(t1?1:0)+(t2a?1:0)+(t2b?1:0)};
  }).filter(x=>x.t1).sort((p,q)=>q.count-p.count||q.tpd-p.tpd);   // เฉพาะผ่านขั้น 1
  document.getElementById('incSummary').innerHTML=
    `ผ่านขั้น 1: <b>${rows.length}</b> คน · ครบ 3 ข้อ: <b>${rows.filter(r=>r.count===3).length}</b> คน · รวมแจก <b>${rows.reduce((s,r)=>s+r.count,0)}</b> สิทธิ์`;
  const cont=document.getElementById('incResults');
  if(!rows.length){ cont.innerHTML='<div class="inc-empty">— ไม่มีใครผ่านเงื่อนไขขั้น 1 —</div>'; return; }
  const aw=(on,icon,label)=>`<span class="inc-aw ${on?'on':'off'}">${icon} ${label}</span>`;
  cont.innerHTML='<div class="inc-grid">'+rows.map(r=>{
    const e=EMP[r.a.id]||{name:r.a.id};
    return `<div class="inc-emp ${r.count===3?'full':''}">
      <div class="avawrap"><div class="ava">${avaImg(e)}</div><div class="cnt">${r.count}/3</div></div>
      <div class="nm">${e.name||r.a.id}</div>
      <div class="cd">${r.a.id}</div>
      <div class="awards">${aw(true,'🎖️','ขั้น 1')}${aw(r.t2a,'⏱️','Talktime')}${aw(r.t2b,'📞','สายโทร')}</div>
      <div class="met">ลา ${r.leave} วัน · ${fmtTime(r.tpd)}/วัน · ${Math.round(r.cpd)} สาย/วัน</div>
    </div>`;
  }).join('')+'</div>';
}
function openIncentive(){
  document.getElementById('incCycle').textContent=document.getElementById('rangeLabel').textContent;
  document.getElementById('incModal').classList.add('on');
  renderIncentive();
}
document.getElementById('incentiveBtn').addEventListener('click',openIncentive);
document.getElementById('incClose').addEventListener('click',()=>document.getElementById('incModal').classList.remove('on'));
document.getElementById('incModal').addEventListener('click',e=>{ if(e.target.id==='incModal') document.getElementById('incModal').classList.remove('on'); });
['incLeave','incTalk','incCalls'].forEach(id=>document.getElementById(id).addEventListener('input',renderIncentive));

const fp=flatpickr('#picker',{mode:'range',dateFormat:'Y-m-d',maxDate:todayYMD(),positionElement:document.getElementById('pickBtn'),
  onOpen:()=>{ fp.set('maxDate', todayYMD()); },   // refresh ทุกครั้งที่เปิด กัน maxDate ค้างวันเก่า (เปิดหน้าข้ามวัน)
  onChange:(sel)=>{ if(sel.length===2){
    const f=(d)=>d.toLocaleString('en-CA',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit'});
    const d1=f(sel[0]),d2=f(sel[1]);
    customR={start:startISO(d1),end:startISO(addYMD(d2,1)),label:'ช่วง '+d1+' → '+d2,live:false};
    curRange='custom'; exitCycle();
    document.querySelectorAll('#ranges button').forEach(x=>x.classList.remove('active'));
    document.getElementById('pickBtn').classList.add('active');
    setPeriodLabel('ช่วงที่เลือก'); closePeriodMenu();   // มือถือ
    load();
  }}});
// ไม่ปิดเมนูตอนเปิดปฏิทิน — flatpickr ต้องใช้ตำแหน่ง pickBtn (ถ้าเมนูปิด pickBtn จะ display:none) · เมนูปิดเองตอนเลือกช่วงเสร็จ (onChange)
document.getElementById('pickBtn').addEventListener('click',()=>fp.open());

// ── ช่วงเวลาแบบ dropdown (เฉพาะมือถือ) — ปุ่มเดียวโชว์ค่าที่เลือก + เมนูที่เหลือ ──
const periodEl=document.querySelector('.period');
function setPeriodLabel(t){ const el=document.getElementById('periodCurrent'); if(el) el.textContent=t; }
function closePeriodMenu(){ periodEl.classList.remove('open'); }
document.getElementById('periodTrigger').addEventListener('click',e=>{ e.stopPropagation(); periodEl.classList.toggle('open'); });
document.addEventListener('click',e=>{ if(periodEl.classList.contains('open') && !periodEl.contains(e.target)) periodEl.classList.remove('open'); });

// สลับ layout เมื่อข้ามจุด 700px (หมุนจอ/ย่อ-ขยาย) → render อันดับใหม่ให้ #2/#3 เข้า-ออกลิสต์
matchMedia('(max-width:700px)').addEventListener('change',()=>{ if(window.__dashUnlocked){ try{ renderRank(); }catch(e){} } });

function boot(){ loadTeams(); load(); }
window.__startDash=boot;
if(window.__dashUnlocked)boot();
